<body>
    <body>
    <main class="payment-container">
        <h2>Finalize Payment</h2>
        
        <div class="order-box">
            <p>Order Total: <strong>$<span id="payment-total">0.00</span></strong></p>
            <p>Items: <span id="item-count">0</span></p>
        </div>

        <div class="credit-card-section">
    <h3>Card Details</h3>
    
    <form action="success.html"> <div class="form-group">
        <label for="card-number">Card Number</label>
        <input type="text" id="card-number" 
               pattern="\d{16}" 
               title="Please enter a 16-digit card number" 
               placeholder="1234123412341234" required>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="expiry">Expiry Date</label>
            <input type="text" id="expiry" 
                   pattern="(0[1-9]|1[0-2])\/([0-9]{2})" 
                   title="Format: MM/YY" 
                   placeholder="MM/YY" required>
        </div>
        
        <div class="form-group">
            <label for="cvv">CVV</label>
            <input type="text" id="cvv" 
                   pattern="\d{3}" 
                   title="3 digits on back of card" 
                   placeholder="123" required>
        </div>
    </div>

    <button type="submit" class="pay-btn">Confirm & Pay Now</button>
</form>
</div>

    </main>
