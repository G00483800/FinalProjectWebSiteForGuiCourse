<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>
<div class="header">
    <div class="logo-section">
        <a href="templates/index.html">
            <img src="/static/logo.png" alt="EcoGlow Logo" style="height: 100px;"width="200">
        </a>

    </div>
    <div class="nav-links">
        <a class="headerlink" href="templates/cart.html"><img src="/static/cartlogo.png" alt="cart" style="height: 30px;"></a>
    </div>
</div>
<body>
    <main class="delivery-container">
        <h2>Shipping Information</h2>
        <form id="delivery-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label>Shipping Address</label>
                <input type="text" id="address" placeholder="123 Eco Street" required>
            </div>

            <div class="form-group">
                <label>Delivery Speed</label>
                <select id="shipping-speed">
                    <option value="0">Standard (5-7 days) - Free</option>
                    <option value="10">Express (1-2 days) - $10.00</option>
                </select>
            </div>

        <!--Here is must be js function for redirecting and simple verification of the details-->
        <button type="button" id="procced" onclick="proceedToPayment()" class="pay-btn">Procced to pay</button>
        <!---Using js make this button redirect to payment page after validation-->
        </form>
    </main>
    <script src="/scripts/delivery.js"></script>
</body>
</html>
