<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - EcoGlow</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>

<div class="header">
    <div class="logo-section">
        <a href="index.html">
            <img src="/static/logo.png" alt="GlowShop Logo" style="height: 100px; width: 250px;">
        </a>
    </div>
    <div class="nav-links">
        <a class="headerlink" href="cart.html">Cart</a>
    </div>
</div>

<main class="delivery-container">
    <h2>Items in your Cart</h2>

    <div class="form-group">
        <ul id="cart-items" style="list-style: none; padding: 0;">
            </ul>
    </div>

    <div class="cart-summary">
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    
    <div class="form-group">
        <h3 style="display: flex; justify-content: space-between;">
            <span>Total:</span>
            <span>$<span id="total-price">0</span></span>
        </h3>
    </div>
    
    <button onclick="window.location.href='delivery.html'" class="pay-btn">
        Proceed to Delivery
    </button>
    
    <div style="margin-top: 10px;">
        <button type="button" onclick="window.location.href='index.html'" class="back-btn" style="width: 100%;height: 40px;">
            ← Back to Shop
        </button>
    </div>
</div>
</main>

<script src="../scripts/cart.js"></script>
</body>
</html>
