<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - EcoGlow</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>

<div class="header">
    <div class="logo-section">
        <a href="index.html">
            <img src="/static/logo.png" alt="GlowShop Logo" style="height: 40px;">
        </a>

    </div>
    <div class="nav-links">
        <a class="headerlink" href="cart.html"><img src="/static/cartlogo.png" alt="cart" style="height: 30px;"></a>
    </div>
</div>

<main class="cart-page">
    <div class="cart-container">
        <h2>Items in your Cart</h2>

        <ul id="cart-items"></ul>

        <div class="cart-summary">
            <hr>
            <h3>Total: $<span id="total-price">0</span></h3>

            <button onclick="window.location.href='delivery.html'" class="checkout-btn">
                Proceed to Delivery
            </button>

            <button class="back-btn">
                <a href="index.html">Back to Shop</a>
            </button>
        </div>
    </div>
</main>
<script src="../scripts/cart.js"></script>
</body>
</html>
